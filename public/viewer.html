<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>查看图片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        body { display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100vh; object-fit: contain; }
        .msg { color: #555; font-family: system-ui, sans-serif; font-size: 14px; }
        .msg.err { color: #c33; }
    </style>
</head>
<body>
    <img id="img" alt="" style="display:none">
    <div class="msg" id="msg">加载中...</div>
    <script>
        const src = new URLSearchParams(location.search).get('src');
        const img = document.getElementById('img');
        const msg = document.getElementById('msg');
        if (src) {
            img.onload = () => { msg.style.display = 'none'; img.style.display = 'block'; };
            img.onerror = () => { msg.className = 'msg err'; msg.textContent = '图片加载失败'; };
            img.src = src;
        } else {
            msg.className = 'msg err'; msg.textContent = '无效链接';
        }
    </script>
</body>
</html>
